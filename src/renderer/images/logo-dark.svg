<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="ocean" cx="40%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#2f5fce"/>
      <stop offset="55%" stop-color="#17368a"/>
      <stop offset="100%" stop-color="#0b2260"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7db0ff"/>
      <stop offset="100%" stop-color="#2f6fe0"/>
    </linearGradient>
    <clipPath id="disc"><circle cx="256" cy="256" r="226"/></clipPath>
  </defs>

  <!-- bright rim + ocean -->
  <circle cx="256" cy="256" r="238" fill="url(#rim)"/>
  <circle cx="256" cy="256" r="226" fill="url(#ocean)"/>

  <!-- continents (light blue) -->
  <g clip-path="url(#disc)" fill="#c9e1fb">
    <!-- North America: broad north, tapering through Central America -->
    <path d="M108 176
             C104 152 128 132 162 130
             C196 128 214 140 236 138
             C256 136 262 156 250 170
             C262 178 258 198 240 202
             C250 214 244 234 224 236
             C210 254 214 276 196 284
             C202 262 186 250 176 262
             C168 246 178 228 168 220
             C150 224 132 214 132 196
             C118 196 108 190 108 176 Z"/>
    <!-- South America: wide shoulder, taper to a southern point -->
    <path d="M196 296
             C214 288 240 292 248 310
             C256 328 246 344 250 362
             C254 384 240 404 226 430
             C218 446 202 442 202 424
             C202 404 214 392 210 372
             C206 352 188 344 190 322
             C191 308 187 300 196 296 Z"/>
    <!-- Greenland -->
    <path d="M296 100
             C286 104 282 120 292 132
             C302 144 322 142 330 128
             C338 114 330 100 316 98
             C308 94 302 96 296 100 Z"/>
    <!-- Europe -->
    <path d="M300 168
             C296 154 312 146 328 152
             C344 158 344 176 330 182
             C318 188 304 182 300 168 Z"/>
    <!-- Africa: rounded top, taper to the Cape -->
    <path d="M300 208
             C292 224 300 240 316 244
             C304 262 312 288 330 300
             C338 322 336 352 352 372
             C362 386 378 378 376 360
             C374 338 366 320 372 298
             C378 274 396 264 394 240
             C392 220 374 210 354 214
             C338 202 316 200 300 208 Z"/>
  </g>

  <!-- glossy highlight -->
  <ellipse cx="184" cy="168" rx="104" ry="66" fill="#ffffff" fill-opacity="0.12" transform="rotate(-26 184 168)"/>
  <circle cx="256" cy="256" r="226" fill="none" stroke="#0a1f52" stroke-opacity="0.35" stroke-width="3"/>
</svg>
